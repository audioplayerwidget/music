<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canva Minimal Player Template</title>
    <style>
        /* Transparent viewport boundaries for perfect blending inside Canva */
        body {
            margin: 0; padding: 0; display: flex; justify-content: center;
            align-items: center; height: 100vh; background: transparent; 
            font-family: Arial, sans-serif;
        }
        /* Minimalist Play/Pause Circle Design UI */
        .play-btn {
            width: 65px; height: 65px; border-radius: 50%; border: none;
            background-color: #ff4757; color: white; font-size: 26px;
            cursor: pointer; display: flex; align-items: center;
            justify-content: center; box-shadow: 0 5px 12px rgba(0,0,0,0.2);
            outline: none; transition: transform 0.2s, background-color 0.3s;
        }
        .play-btn:active { transform: scale(0.95); }
        audio { display: none; }
    </style>
</head>
<body>

    <button class="play-btn" id="customPlayBtn">▶</button>
    <audio id="myAudio" preload="auto" crossorigin="anonymous"></audio>

    <script>
        const audio = document.getElementById('myAudio');
        const playBtn = document.getElementById('customPlayBtn');

        // Extract parameters safely from the URL layout metrics
        const urlParams = new URLSearchParams(window.location.search);
        const embedColor = urlParams.get('c');
        const targetTrack = urlParams.get('s');

        // Apply customized adjustments instantly
        if (embedColor) {
            playBtn.style.backgroundColor = '#' + embedColor;
        }
        if (targetTrack) {
            audio.src = 'https://hostingersite.com' + targetTrack + '.mp3';
        }

        // Manage audio play state toggle executions
        playBtn.addEventListener('click', () => {
            if (!audio.src) return;
            if (audio.paused) {
                audio.play().then(() => playBtn.innerHTML = "⏸").catch(err => console.error(err));
            } else {
                audio.pause();
                playBtn.innerHTML = "▶";
            }
        });
        audio.addEventListener('ended', () => playBtn.innerHTML = "▶");
    </script>
</body>
</html>
